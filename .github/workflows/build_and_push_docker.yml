name: Build, Push, Train, and Test Model 

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # -
      #   name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3
      # -
      #   name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/model_trainer:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/model_trainer:sha-${{ github.sha }}

  launch-pod:
    name: Launch 4090 Pod
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Preflight
        shell: bash
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            https://rest.runpod.io/v1/pods)
          echo "GET /v1/pods -> $code"
          if [ "$code" -ne 200 ]; then
            echo "Auth failed (expect 200). Check key permissions (set to All) and header format."; exit 1
          fi
      - name: Create pod
        shell: bash
        run: |
          payload='{"templateId":"${{ vars.RUNPOD_TEMPLATE_ID }}","cloudType":"COMMUNITY","gpuCount":1,"gpuTypeIds":["NVIDIA GeForce RTX 4090"]}'

          status=$(curl -sS -o resp.json -w "%{http_code}" \
            -X POST "https://rest.runpod.io/v1/pods" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "Response ($status):"
          cat resp.json

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "RunPod create failed."; exit 1
          fi
