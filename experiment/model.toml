# Model Parameters

model = "Transformer"

[global]
num_layers = 3
embedding_dim = 384
feedforward_dim = 1536
max_context = 500
activation = "GELU"

[attention]
n_heads=3
project_kv = false
projection_dim = 256
qk_dim = 128
v_dim = 128
causal = true
sdpa = true


[norm]
type = "RMSNorm"

[dropout]
attn_dropout = 0.1
ffn_dropout = 0.1

[rope]
base = 10000
