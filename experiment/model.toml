# Model Parameters

model = "Transformer"

[global]
num_layers = 8
embedding_dim = 256
feedforward_dim = 1024
max_context = 512
activation = "SVDTruncation"

[attention]
n_heads = 4
project_kv = true
projection_dim = 64
qk_dim = 64
v_dim = 64
causal = true
sdpa = true

[activation_kwargs]
k = 12

[norm]
type = "RMSNorm"

[dropout]
attn_dropout = 0.0
ffn_dropout = 0.0

[rope]
base = 10000
