# Model Parameters

model = "Transformer"

[global]
num_layers = 24
embedding_dim = 1024
feedforward_dim = 4096
max_context = 512
activation = "GELU"

[attention]
n_heads=8
project_kv = true
projection_dim = 256
qk_dim = 128
v_dim = 128
causal = true
sdpa = true


[norm]
type = "RMSNorm"

[dropout]
attn_dropout = 0.1
ffn_dropout = 0.1

[rope]
base = 10000
