# Model Parameters

model = "Transformer"

[global]
num_layers = 28
embedding_dim = 256
feedforward_dim = 1024
max_context = 512
activation = "QRTruncation"
vocab_size = 4000
padding_idx = 3

[attention]
n_heads = 4
project_kv = false
projection_dim = 64
qk_dim = 64
v_dim = 64
causal = true
sdpa = true

[activation_kwargs]
k = 13

[norm]
type = "RMSNorm"

[dropout]
attn_dropout = 0.0
ffn_dropout = 0.0

[rope]
base = 10000