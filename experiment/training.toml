# Training hyperparameters

batch_size = 1
accumulated_batch_size = 256
loss = "CrossEntropyLoss"
optimizer = "AdamW"
test_prompt = "The dog"
base_lr = 1e-4
total_steps = 5000

scheduler = "OneCycleLR"
warmup_steps = 50
weight_decay = 0.02

[scheduler_kwargs]
eta_min = 1e-5

[optimizer_kwargs]
betas = [0.9, 0.95]
