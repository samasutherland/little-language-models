[build_context]
embedding_dim = 256

[model_parameters]
type = "transformer"
num_layers = 2
embedding_layer:
    layertype = "embedding"
    type = "standardembeddinglayer"
    vocab_size = 4000
    padding_idx = 3

final_norm:
    layertype = "norm"
    type = "rmsnorm"

transformer_layer:
    layertype = "transformer"
    type = "standardtransformerlayer"
    dropout = 0.0
    feedforward_dim = 1024

    activation:
        layertype = "activation"
        type = "gelu"

    norm:
        layertype = "norm"
        type = "rmsnorm"

    attention_layer:
        layertype = "attention"
        type = "multiheadselfattention"
        v_dim = 64
        causal = true
        n_heads = 4
        sdpa = true
        dropout = 0.0
        reproject = true

        positional_encoding:
            layertype = "positional_encoding"
            type = "rope"
            base = 10000
            qk_dim = 64
            max_context = 512