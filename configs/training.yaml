loop_dataset: true

evaluation_step_factory:
  type: evaluationstep
  
  criterion_factory:
    type: crossentropy
    
gradient_step_factory:
  type: gradientstep
  grad_clip_norm: 1.0

  scheduler_factory:
    type: onecyclelr
    initial_div_factor: 10.0
    final_div_factor: 100.0
    peak_frac: 0.05
    
    optimizer_factory:
      type: adamw
      weight_decay: 0.02
      betas: [ 0.9, 0.95 ]
      
validation_step_factory:
  type: validationstep
  validation_batches: 30
  
  criterion_factory:
    type: crossentropy
      
aim_logger_factory:
  type: aimloggerfactory
  
train_checkpointer_factory:
  type: checkpointerfactory
  folder_name: checkpoints
  checkpoint_filename: ckpt_best_train.pt

val_checkpointer_factory:
  type: checkpointerfactory
  folder_name: checkpoints
  checkpoint_filename: ckpt_best_val.pt
  





