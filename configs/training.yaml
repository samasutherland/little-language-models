type: trainingloop
descent_steps: 3228
accumulation_steps: 4
val_frequency: 20
context_path: ../configs/context.yaml

evaluation_step_factory:
  type: evaluationstep
  
  criterion_factory:
    type: crossentropy
    
gradient_step_factory:
  type: gradientstep
  grad_clip_norm: 1.0

  scheduler_factory:
    type: onecyclelr
    lr: 0.0046353708021342754
    initial_div_factor: 3.0
    final_div_factor: 10.0
    peak_frac: 0.001
    
    optimizer_factory:
      type: adamw
      weight_decay: 0.02
      betas: [ 0.9, 0.95 ]
      
validation_step_factory:
  type: validationstep
  validation_batches: 1
  
  criterion_factory:
    type: crossentropy
      
aim_logger_factory:
  type: aimloggerfactory
  
train_checkpointer_factory:
  type: checkpointerfactory
  folder_name: train_checkpoints

val_checkpointer_factory:
  type: checkpointerfactory
  folder_name: val_checkpoints





