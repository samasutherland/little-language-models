type: transformer
embedding_dim: 192

embedding_layer_factory:
  type: standardembeddinglayer

final_norm_factory:
  type: rmsnorm

transformer_layer_factory:
  type: standardtransformerlayer
  dropout: 0.0
  feedforward_dim: 768

  activation_factory:
    type: gelu

  attention_norm_factory:
    type: rmsnorm

  feedforward_norm_factory:
    type: rmsnorm

  attention_factory:
    type: latentmultiheadselfattention
    max_context: 512
    qk_dim: 32
    v_dim: 32
    causal: true
    n_heads: 6
    sdpa: true
    dropout: 0.0
    reproject: true
    projection_dim: 32

    positional_encoding_factory:
      type: rope
      base: 10000

