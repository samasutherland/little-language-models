type: transformer
embedding_dim: 288

embedding_layer_factory:
  type: standardembeddinglayer

final_norm_factory:
  type: rmsnorm

transformer_layer_factory:
  type: standardtransformerlayer
  dropout: 0.0
  feedforward_dim: 1152

  activation_factory:
    type: gelu

  attention_norm_factory:
    type: rmsnorm

  feedforward_norm_factory:
    type: rmsnorm

  attention_factory:
    type: multiheadselfattention
    max_context: 512
    qk_dim: 96
    v_dim: 96
    causal: true
    n_heads: 3
    sdpa: true
    dropout: 0.0
    reproject: true

    positional_encoding_factory:
      type: rope
      base: 10000

